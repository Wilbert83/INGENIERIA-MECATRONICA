  [data-theme="dark"]  {
    --bg:#07090F; --surface:#0D1322; --border:rgba(255,255,255,0.08);
    --text:#E2E8F0; --text-d:#94A3B8; --text-m:#4B5563;
  }
  [data-theme="light"] {
    --bg:#EDF2F8; --surface:#FFFFFF; --border:rgba(15,23,42,0.10);
    --text:#0F172A; --text-d:#334155; --text-m:#64748B;
  }
  [data-theme="light"] body { background-image:radial-gradient(circle,rgba(15,23,42,0.05) 1px,transparent 1px); }

  html,body{height:100%}
  body{
    background-color:var(--bg); color:var(--text);
    font-family:var(--disp); display:flex; flex-direction:column;
    align-items:center; justify-content:center; min-height:100vh; padding:24px;
    background-image:radial-gradient(circle, var(--p-d) 1px, transparent 1px);
    background-size:28px 28px;
    transition:background-color 0.3s, color 0.3s;
    text-align:center;
  }

  /* ── 404 con glitch ── */
  .err-code {
    font-size:clamp(80px,20vw,160px); font-weight:700; line-height:1;
    color:var(--p); letter-spacing:-.04em; margin-bottom:4px;
    position:relative; display:inline-block;
    transition:color 0.3s;
  }
  .err-code::before {
    content:'404'; position:absolute; left:3px; top:0;
    color:color-mix(in srgb,var(--p) 60%,red);
    clip-path:polygon(0 20%,100% 20%,100% 35%,0 35%);
    animation:g1 3.5s infinite;
  }
  .err-code::after {
    content:'404'; position:absolute; left:-3px; top:0;
    color:color-mix(in srgb,var(--p) 60%,blue);
    clip-path:polygon(0 65%,100% 65%,100% 80%,0 80%);
    animation:g2 3.5s infinite;
  }
  @keyframes g1{0%,92%,100%{opacity:0}93%,97%{opacity:1;transform:translateX(2px)}}
  @keyframes g2{0%,92%,100%{opacity:0}94%,98%{opacity:1;transform:translateX(-2px)}}

  .err-label {
    font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--p); margin-bottom:20px; transition:color 0.3s;
  }
  h1 { font-size:clamp(20px,3.5vw,32px); font-weight:700; margin-bottom:10px; line-height:1.15; }
  .err-sub {
    font-family:var(--mono); font-size:12.5px; color:var(--text-d);
    margin-bottom:28px; line-height:1.75; max-width:420px;
    transition:color 0.3s;
  }
  .err-block {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:12px 18px; margin-bottom:30px;
    font-family:var(--mono); font-size:11.5px; color:var(--text-m);
    text-align:left; max-width:340px; width:100%;
    transition:background 0.3s, border-color 0.3s, color 0.3s;
  }
  .err-block span { color:var(--p); transition:color 0.3s; }
  .btn-home {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--p); color:#000; font-family:var(--mono); font-size:12px;
    font-weight:600; padding:10px 22px; border-radius:8px; text-decoration:none;
    transition:opacity 0.18s, transform 0.15s, background 0.3s;
    letter-spacing:.04em; margin-bottom:40px;
  }
  .btn-home:hover{opacity:.85;transform:translateY(-1px)}

  /* ── Controles (esquina superior derecha) ── */
  .controls {
    position:fixed; top:14px; right:14px;
    display:flex; align-items:center; gap:8px;
  }

  /* Selector de color — igual que en el índice */
  .accent-group {
    display:flex; align-items:center; gap:4px; flex-wrap:wrap;
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:4px 8px; max-width:260px;
    transition:background 0.3s, border-color 0.3s;
  }
  .accent-dot {
    width:14px; height:14px; border-radius:50%;
    border:2px solid transparent; cursor:pointer; padding:0;
    transition:transform 0.15s, border-color 0.2s; outline:none;
  }
  .accent-dot:hover { transform:scale(1.3); }
  .accent-dot.active { border-color:var(--text); }
  .accent-rand {
    width:14px; height:14px; border-radius:50%;
    background:transparent; border:1.5px solid var(--border);
    cursor:pointer; font-size:9px; display:grid; place-items:center;
    transition:transform 0.2s, border-color 0.2s; outline:none;
    line-height:1;
  }
  .accent-rand:hover { transform:rotate(25deg) scale(1.2); border-color:var(--p); }
  .accent-rand.active { border-color:var(--p); }

  .theme-btn {
    width:30px; height:30px; border-radius:7px;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text-d); cursor:pointer; display:grid; place-items:center;
    transition:border-color 0.18s, color 0.18s, background 0.3s;
    flex-shrink:0;
  }
  .theme-btn:hover{border-color:var(--p);color:var(--p)}
  </style>
</head>
<body>

  <!-- ── Controles ── -->
  <div class="controls">

    </div>

  </div>

  <!-- ── Contenido ── -->
  <div class="err-code">404</div>
  <div class="err-label">// error :: señal perdida</div>
  <h1>Página no encontrada</h1>
  <p class="err-sub">La URL que buscas no existe en este sistema.<br>
  Puede que haya sido movida, renombrada o aún esté pendiente.</p>

  <div class="err-block">
    <span>GET</span> <em id="errPath"></em><br>
    Status: <span>404</span> Not Found<br>
    Sistema: <span>Mecatrónica · Wilbert</span>
  </div>

  <a class="btn-home" href="/INGENIERIA-MECATRONICA/">← Volver al inicio</a>

<script>
const MOON=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`;
const SUN =`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

const ALL_ACCENTS = [
  'cyan','celeste','azul','indigo','violeta','purpura',
  'fuchsia','rosa','rojo','coral','naranja','amarillo',
  'lima','esmeralda','verde','blanco',
  'carmesi','cobalto','turquesa','esmeralda2','mostaza',
  'ambar','magenta','vino','lavanda','petroleo'
];

const $ = id => document.getElementById(id);

/* ── Ruta que falló ── */
$('errPath').textContent = location.pathname;

/* ── Acento ── */
function applyAccent(accent) {
  document.documentElement.dataset.accent = accent;
  syncDots(accent);
}

function syncDots(accent) {
  const isRand = !localStorage.getItem('accentFixed');
  document.querySelectorAll('.accent-dot:not(.accent-rand)').forEach(b =>
    b.classList.toggle('active', !isRand && b.dataset.accent === accent)
  );
  $('randBtn').classList.toggle('active', isRand);
  $('randBtn').title = isRand
    ? 'Aleatorio activo — clic para fijar color actual'
    : 'Clic para volver a color aleatorio';
}

document.querySelectorAll('.accent-dot:not(.accent-rand)').forEach(btn => {
  btn.addEventListener('click', () => {
    localStorage.setItem('accentFixed', btn.dataset.accent);
    applyAccent(btn.dataset.accent);
  });
});

$('randBtn').addEventListener('click', () => {
  if (localStorage.getItem('accentFixed')) {
    localStorage.removeItem('accentFixed');
  }
  const next = ALL_ACCENTS[Math.floor(Math.random() * ALL_ACCENTS.length)];
  applyAccent(next);
});

/* ── Tema ── */
function syncTheme() {
  const dark = document.documentElement.dataset.theme !== 'light';
  $('themeBtn').innerHTML = dark ? MOON : SUN;
  $('themeBtn').title = dark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro';
}

$('themeBtn').addEventListener('click', () => {
  const nxt = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = nxt;
  localStorage.setItem('theme', nxt);
  syncTheme();
});

/* ── Init ── */
(function() {
  const fixed = localStorage.getItem('accentFixed');
  if (!fixed) {
    const rand = ALL_ACCENTS[Math.floor(Math.random() * ALL_ACCENTS.length)];
    applyAccent(rand);
  } else {
    syncDots(fixed);
  }
  syncTheme();
  requestAnimationFrame(() => requestAnimationFrame(() =>
    document.documentElement.setAttribute('data-ready', '')
  ));
})();
</script>
</body>
</html>
